worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        # NGINX escuchará en el puerto 80 (El puerto por defecto de internet)
        listen       80;
        server_name  localhost;

        # 1. API Gateway: Redirigir tráfico de Tracking Service (Java)
        location /api/v1/tracking/ {
            
            # MAGIA ANTI-CORS: Le decimos al navegador que Vite (5173) es nuestro amigo
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            
            # Redirigimos la petición al puerto 8080 (Donde vive Spring Boot)
            proxy_pass http://localhost:8080/api/v1/tracking/;
        }
    }
}